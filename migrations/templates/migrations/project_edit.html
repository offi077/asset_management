{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2>Edit Project: {{ project.project_name }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Project Name</label>
            <input type="text" name="project_name" class="form-control" value="{{ project.project_name }}" required>
        </div>
        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control">{{ project.description }}</textarea>
        </div>
        <div class="mb-3">
            <label>Status</label>
            <select name="status" class="form-control">
                {% for value, label in status_choices %}
                <option value="{{ value }}" {% if project.status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Start Date</label>
            <input type="date" name="planned_start_date" class="form-control" value="{{ project.planned_start_date|date:'Y-m-d' }}" required>
        </div>
        <div class="mb-3">
            <label>End Date</label>
            <input type="date" name="planned_end_date" class="form-control" value="{{ project.planned_end_date|date:'Y-m-d' }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Project</button>
        <a href="{% url 'migrations:project_detail' project.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
